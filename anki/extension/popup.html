<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="vocab">Vocabulary</button>
            <button class="tab" data-tab="phrase">Phrase</button>
        </div>

        <div class="tab-content active" id="vocab">
            <div class="title">Add Vocabulary</div>

            <div class="input-row">
                <input id="word-input" placeholder="enter word..." />

                <select id="pos">
                    <option value="">auto</option>
                    <option value="any">any</option>
                    <option value="noun">noun</option>
                    <option value="verb">verb</option>
                    <option value="adjective">adjective</option>
                    <option value="adverb">adverb</option>
                    <option value="preposition">preposition</option>
                </select>
            </div>
        </div>

        <div class="tab-content" id="phrase">
            <div class="title">Add Phrase</div>
            <div class="input-row">
                <input id="phrase-input" placeholder="enter phrase..." />
            </div>
        </div>

        <div id="status"></div>
    </div>

    <script src="popup.js"></script>
    <script src="vocab.js"></script>
    <script src="phrase.js"></script>

</body>

</html>
