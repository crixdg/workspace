<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            width: 260px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f7f8;
            color: #1f2328;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            color: #444;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            font-size: 14px;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #4c8bf5;
            box-shadow: 0 0 0 2px rgba(76, 139, 245, 0.2);
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #4c8bf5;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
        }

        button:hover {
            background: #3a73d9;
        }

        button:active {
            transform: scale(0.97);
        }

        #status {
            font-size: 12px;
            color: #6a737d;
            min-height: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title">Add Vocabulary</div>

        <input id="word" placeholder="Enter word..." />

        <button id="add">Add to Anki</button>

        <div id="status"></div>
    </div>

    <script src="popup.js"></script>

</body>

</html>
