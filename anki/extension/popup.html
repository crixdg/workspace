<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 360px;
            font-family: -apple-system, BlinkMacSystemFont, "Ubuntu Mono", "Segoe UI", Roboto, sans-serif;

            background: #282828;
            color: #ebdbb2;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;

            background: #3c3836;
            padding: 12px;
            border: 1px solid #504945;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            color: #fabd2f;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #504945;
            font-size: 14px;
            outline: none;

            background: #282828;
            color: #ebdbb2;
        }

        input::placeholder {
            color: #a89984;
        }

        input:focus {
            border-color: #458588;
            box-shadow: 0 0 0 2px rgba(69, 133, 136, 0.3);
        }

        .input-row {
            display: flex;
            gap: 6px;
        }

        .input-row input {
            flex: 1;
        }

        select {
            width: 100px;
            padding: 10px 6px;
            border-radius: 8px;
            border: 1px solid #504945;
            font-size: 13px;
            outline: none;
            background: #282828;
            color: #ebdbb2;
        }

        select:focus {
            border-color: #4c8bf5;
            box-shadow: 0 0 0 2px rgba(76, 139, 245, 0.2);
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;

            background: #8f8f13;
            color: #282828;

            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
        }

        button:hover {
            background: #b8bb26;
        }

        button:active {
            transform: scale(0.97);
        }

        #status {
            font-size: 12px;
            color: #a89984;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title">Add Vocabulary</div>

        <div class="input-row">
            <input id="word" placeholder="Enter word..." />

            <select id="pos">
                <option value="">Auto</option>
                <option value="noun">Noun</option>
                <option value="verb">Verb</option>
                <option value="adjective">Adjective</option>
                <option value="adverb">Adverb</option>
                <option value="preposition">Preposition</option>
            </select>
        </div>

        <button id="add">Add to Anki</button>

        <div id="status"></div>
    </div>

    <script src="popup.js"></script>

</body>

</html>
