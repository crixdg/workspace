<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, "Ubuntu Mono", "Segoe UI", Roboto, sans-serif;

            background: #282828;
            color: #ebdbb2;
            border: 1.5px solid #aaaaaa;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;

            background: #3c3836;
            padding: 12px 16px;
            border: 1px solid #504945;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            color: #fabd2f;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #504945;
            font-size: 14px;
            outline: none;

            background: #282828;
            color: #ebdbb2;
        }

        input::placeholder {
            color: #a89984;
        }

        input:focus {
            border-color: #458588;
            box-shadow: 0 0 0 2px rgba(69, 133, 136, 0.3);
        }

        .input-row {
            display: flex;
            gap: 6px;
        }

        .input-row input {
            flex: 1;
        }

        select {
            width: 100px;
            padding: 10px 6px;
            border-radius: 8px;
            border: 1px solid #504945;
            font-size: 13px;
            outline: none;
            background: #282828;
            color: #ebdbb2;
        }

        select:focus {
            border-color: #4c8bf5;
            box-shadow: 0 0 0 2px rgba(76, 139, 245, 0.2);
        }

        #status {
            font-size: 12px;
            color: #a89984;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title">Add Vocabulary</div>

        <div class="input-row">
            <input id="word" placeholder="enter word..." />

            <select id="pos">
                <option value="">auto</option>
                <option value="any">any</option>
                <option value="noun">noun</option>
                <option value="verb">verb</option>
                <option value="adjective">adjective</option>
                <option value="adverb">adverb</option>
                <option value="preposition">preposition</option>
            </select>
        </div>

        <div id="status"></div>
    </div>

    <script src="popup.js"></script>

</body>

</html>
